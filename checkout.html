<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — CaneCreme</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">CaneCreme</a>
      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <h1>Checkout</h1>
  </div>

  <div class="checkout-layout">
    <!-- LEFT: FORM -->
    <div class="checkout-form-wrap">
      <h2>Shipping Details</h2>
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="c-name" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="c-email" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="tel" id="c-phone" placeholder="+91  XXXXX XXXXX" />
      </div>
      <div class="form-group">
        <label>Address Line 1 *</label>
        <input type="text" id="c-address1" placeholder="House/Flat No., Street" />
      </div>
      <div class="form-group">
        <label>Address Line 2</label>
        <input type="text" id="c-address2" placeholder="Area, Landmark (optional)" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City *</label>
          <input type="text" id="c-city" placeholder="City" />
        </div>
        <div class="form-group">
          <label>State *</label>
          <input type="text" id="c-state" placeholder="State" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>PIN Code *</label>
          <input type="text" id="c-pin" placeholder="XXXXXX" />
        </div>
        <div class="form-group">
          <label>Country *</label>
          <input type="text" id="c-country" placeholder="India" value="India" />
        </div>
      </div>
      <div id="checkout-error" class="error-msg" style="display:none;"></div>
      <button class="btn-primary btn-full" id="pay-btn">Pay Now</button>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="order-summary">
      <h2>Order Summary</h2>
      <div id="summary-items"></div>
      <div class="summary-total">
        <span>Total</span>
        <span>₹<span id="summary-total">0</span></span>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 CaneCreme. All rights reserved.</p>
  </footer>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
