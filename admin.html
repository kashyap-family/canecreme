<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — CaneCreme</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="admin-body">

  <!-- LOGIN SCREEN -->
  <div id="admin-login" class="admin-login">
    <div class="login-box">
      <h1>CaneCreme</h1>
      <p>Admin Panel</p>
      <input type="password" id="admin-password" placeholder="Enter admin password" />
      <button class="btn-primary btn-full" onclick="adminLogin()">Login</button>
      <p id="login-error" class="error-msg" style="display:none;">Incorrect password</p>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="admin-dashboard" style="display:none;">
    <div class="admin-nav">
      <span class="logo">CaneCreme Admin</span>
      <div class="admin-nav-links">
        <button onclick="showTab('products')" class="tab-btn active" id="tab-products">Products</button>
        <button onclick="showTab('orders')" class="tab-btn" id="tab-orders">Orders</button>
        <button onclick="adminLogout()" class="tab-btn">Logout</button>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="tab-products-content" class="admin-content">
      <div class="admin-section-header">
        <h2>Products</h2>
        <button class="btn-primary" onclick="openProductModal()">+ Add Product</button>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Active</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-table-body">
            <tr><td colspan="6" style="text-align:center;padding:2rem;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders-content" class="admin-content" style="display:none;">
      <div class="admin-section-header">
        <h2>Orders</h2>
      </div>
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Total</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-table-body">
            <tr><td colspan="8" style="text-align:center;padding:2rem;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay" id="product-modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Product</h3>
        <button onclick="closeProductModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="p-id" />
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="p-name" placeholder="e.g. Sugarcane Juice 500ml" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="p-description" placeholder="Describe your product..." rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="p-price" placeholder="0.00" step="0.01" />
          </div>
          <div class="form-group">
            <label>Compare At Price (₹)</label>
            <input type="number" id="p-compare-price" placeholder="0.00" step="0.01" />
          </div>
        </div>
        <div class="form-group">
          <label>Stock Quantity *</label>
          <input type="number" id="p-stock" placeholder="0" />
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="text" id="p-image" placeholder="https://... (paste image link)" />
          <small>Upload your image to a free host like <a href="https://imgur.com" target="_blank">imgur.com</a> and paste the link here</small>
        </div>
        <div class="form-group checkbox-group">
          <label><input type="checkbox" id="p-active" checked /> Product is Active (visible on store)</label>
        </div>
        <div id="product-error" class="error-msg" style="display:none;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeProductModal()">Cancel</button>
        <button class="btn-primary" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div class="modal-overlay" id="order-modal-overlay" style="display:none;">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>Order Details</h3>
        <button onclick="closeOrderModal()">✕</button>
      </div>
      <div class="modal-body" id="order-detail-content"></div>
      <div class="modal-footer">
        <label>Update Status: </label>
        <select id="order-status-select">
          <option value="new">New</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button class="btn-primary" onclick="updateOrderStatus()">Update</button>
        <button class="btn-secondary" onclick="closeOrderModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
